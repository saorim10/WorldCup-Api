spring:
  application:
    name: worldcup-api

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[default_schema]": public

  datasource:
    url: jdbc:h2:mem:world-cup
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2: 
    console: 
      enabled: true
      path: /h2-console

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method